<!DOCTYPE html>
<html>
<head>
    <title>PillPall - Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
            padding-top: 80px;
        }

        .title {
            font-size: 50px;
            font-weight: 800;
            background: linear-gradient(to right, #2c3e50, #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 16px;
            color: #333;
            margin-bottom: 30px;
        }

        .box {
            background: white;
            padding: 35px;
            width: 320px;
            margin: auto;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.03);
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .login-btn {
            padding: 12px 25px;
            background: linear-gradient(to right, #4CAF50, #2ecc71);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body>

    <h1 class="title">PillPall</h1>
    <div class="subtitle">Smart Medication Management System</div>

    <div class="box">
        <input type="text" placeholder="Enter User Name">
        <input type="number" placeholder="Enter Phone Number">
       <button class="login-btn" onclick="window.location.href='details.html'">Login</button>  
    </div>

</body>
</html>
